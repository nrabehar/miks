services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miks_api
    environment:
      - COOKIE_SECRET=${COOKIE_SECRET:-default_cookie_secret}
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret}

      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your_google_client_id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your_google_client_secret}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://localhost:8443/api/auth/oauth/google/callback}
    networks:
      - miks_net
    restart: unless-stopped