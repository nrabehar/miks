services:

  web:
      image: miks:web
      build:
        context: frontend
        dockerfile: Dockerfile
        args:
          - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
      container_name: miks_web
      command: nginx -g 'daemon off;'
      depends_on:
        - backend
      networks:
        - miks_net
        - dokploy-network
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.proxy.loadbalancer.server.port=80"
        - "traefik.docker.network=dokploy-network"
      restart: unless-stopped

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: miks_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}

      - COOKIE_SECRET=${COOKIE_SECRET:-default_cookie_secret}
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret}

      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your_google_client_id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your_google_client_secret}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://localhost:8443/api/auth/oauth/google/callback}
    networks:
      - miks_net
      - dokploy-network
    restart: unless-stopped

networks:
  miks_net:
    driver: bridge
  dokploy-network:
    external: true